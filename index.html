<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Multimedia - El Mensaje del Chasqui</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #f3f4f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; background: #111827; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #1f2937; text-align: center; }
        h1 { color: #3b82f6; margin-bottom: 5px; font-size: 2rem; }
        .subtitle { color: #9ca3af; margin-bottom: 25px; font-size: 1rem; }
        .video-box { width: 100%; max-width: 750px; margin: 0 auto; border: 4px solid #1f2937; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); position: relative; padding-top: 56.25%; /* Relación de aspecto 16:9 */ }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        .controls { margin-top: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        button { background: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        button.btn-reset { background: #4b5563; }
        button.btn-reset:hover { background: #374151; }
        button.btn-optA { background: #dc2626; }
        button.btn-optA:hover { background: #b91c1c; }
        button.btn-optB { background: #059669; }
        button.btn-optB:hover { background: #047857; }
        .footer-info { margin-top: 30px; border-top: 1px solid #1f2937; padding-top: 20px; color: #6b7280; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Caso de Estudio: El Mensaje del Chasqui</h1>
    <p class="subtitle">Materia: Interfaces y Multimedia - Redes de Comunicación del Tahuantinsuyo</p>
    
    <div class="video-box">
        <!-- El reproductor multimedia cargará dinámicamente cada recurso de red de Google Drive -->
        <video id="video-chasqui" controls autoplay>
            <source id="video-source" src="https://docs.google.com/uc?export=download&id=1EUcKmxVv-L8q3aIcGw-SxwVUuq_zNKtK" type="video/mp4">
            Tu navegador no soporta video de HTML5.
        </video>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="cargarVideo('inicio')">🔄 Reiniciar (Introducción)</button>
        <button class="btn-optA" onclick="cargarVideo('montana')">⛰️ Opción A: Ruta de la Montaña</button>
        <button class="btn-optB" onclick="cargarVideo('valle')">🌾 Opción B: Ruta del Valle</button>
    </div>

    <div class="footer-info">
        <p>Interfaz de Red Estructurada construida en HTML5 y JavaScript Nativo. Despliegue síncrono en GitHub Pages.</p>
    </div>
</div>

<script>
    // Diccionario de nodos multimedia conectados directamente a tus IDs de Drive
    const fuentesVideo = {
        inicio: "https://docs.google.com/uc?export=download&id=1EUcKmxVv-L8q3aIcGw-SxwVUuq_zNKtK",
        montana: "https://docs.google.com/uc?export=download&id=10jYdT-bAB5zJc2WMwNf9NRGeuf32F3Cu",
        valle: "https://docs.google.com/uc?export=download&id=1sX0Gc2MSDbmX8PGBEtk6xbHn0Lmoc95N"
    };

    const video = document.getElementById('video-chasqui');
    const source = document.getElementById('video-source');

    function cargarVideo(nodo) {
        // Manipulación dinámica del DOM para alterar la fuente de transmisión asíncrona
        source.src = fuentesVideo[nodo];
        video.load();
        video.play();
    }
</script>

</body>
</html>
