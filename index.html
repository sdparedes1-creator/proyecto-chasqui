<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Multimedia - El Mensaje del Chasqui</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #f3f4f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; background: #111827; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #1f2937; text-align: center; }
        h1 { color: #3b82f6; margin-bottom: 5px; font-size: 2rem; }
        .subtitle { color: #9ca3af; margin-bottom: 25px; font-size: 1rem; }
        .video-box { width: 100%; max-width: 750px; margin: 0 auto; border: 4px solid #1f2937; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        video { width: 100%; display: block; }
        .controls { margin-top: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        button { background: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        button.btn-reset { background: #4b5563; }
        button.btn-reset:hover { background: #374151; }
        button.btn-optA { background: #dc2626; }
        button.btn-optA:hover { background: #b91c1c; }
        button.btn-optB { background: #059669; }
        button.btn-optB:hover { background: #047857; }
        .footer-info { margin-top: 30px; border-top: 1px solid #1f2937; padding-top: 20px; color: #6b7280; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Caso de Estudio: El Mensaje del Chasqui</h1>
    <p class="subtitle">Materia: Interfaces y Multimedia - Redes de Comunicación del Tahuantinsuyo</p>
    
    <div class="video-box">
        <video id="video-chasqui" controls>
            <!-- ENLACE DIRECTO AL VIDEO DEL INTEGRANTE 4 (Sincronizado en Canva) -->
            <source src="https://docs.google.com/uc?export=download&id=ID_DE_NUESTRO_VIDEO_EN_DRIVE" type="video/mp4">
            Tu navegador no soporta video de HTML5.
        </video>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="cambiarEscena(0)">🔄 Reiniciar Historial</button>
        <button class="btn-optA" onclick="cambiarEscena(10)">⛰️ Opción A: Ruta de la Montaña</button>
        <button class="btn-optB" onclick="cambiarEscena(20)">🌾 Opción B: Ruta del Valle</button>
    </div>

    <div class="footer-info">
        <p>Interfaz de Red Multicapa construida en HTML5 y JavaScript Nativo. Despliegue síncrono en GitHub Pages.</p>
    </div>
</div>

<script>
    const video = document.getElementById('video-chasqui');

    function cambiarEscena(segundo) {
        video.currentTime = segundo;
        video.play();
    }
    
    video.addEventListener('timeupdate', function() {
        if (video.currentTime >= 9.9 && video.currentTime < 10) {
            video.pause();
        }
        else if (video.currentTime >= 19.9 && video.currentTime < 20) {
            video.pause();
        }
    });
</script>

</body>
</html>
